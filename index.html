  <script>
    tailwind.config = {

            'brand-saffron': '#E85D04',
            'brand-terracotta': '#9C3D22',
            'brand-sand': '#E2D4C1',

            // Legacy fallbacks mapped to new system
            void: '#0B0B0A',
            paper: '#F4F0EB',
            accent: '#E70000',
          },
          cursor: {
            none: 'none',
          },
          animation: {
            'marquee-fast': 'marquee 10s linear infinite',
            'marquee-slow': 'marquee 25s linear infinite',
            'spin-slow': 'spin 8s linear infinite',
          },
          keyframes: {
            marquee: {
              '0%': { transform: 'translateX(0%)' },

            }
          }
        },
      },
    }
  </script>

  <!-- Global Custom CSS (Bento Grid & Typography Rules & Noise) -->
  <style>
    /* 
      Hybrid Sarvam + Studio Linear Aesthetic 
      - Strict structural borders (Linear)
      - Warm, textured paper grounding (Sarvam)
    */
    :root {
      --bg-color: #FDFBF7;
      --text-color: #161412;
      --border-color: #D62828;
      /* Modern Indian Motif / Jaali - abstracted to geometric grid */
      --pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M29.5 0h1v29.5h29.5v1H30.5V60h-1V30.5H0v-1h29.5V0z' fill='%23D62828' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    html {
      scroll-behavior: smooth;
      background-color: var(--bg-color);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
      cursor: none;
      width: 100vw;
      /* Apply authentic texture */
      background-image: var(--pattern);
      /* Safe area padding for iPhones with notch/dynamic island */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .bento-box,
    .bento-box-dark {
      border: 1px solid var(--border-color);
      border-radius: 1.5rem;
      overflow: hidden;
      transition: all 0.5s ease-out;
    }

    .bento-box-dark {
      border-color: #161412;
    }

    @media (hover: none) and (pointer: coarse) {

      body,
      * {
        cursor: auto !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    ::selection {
      background-color: #E70000;
      color: #FFFFFF;
    }

    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    * {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Bento Grid Utilities */
    .bento-box {
      border: 1px solid #E70000;
      border-radius: 1.5rem;
      overflow: hidden;
      background-color: #FFFFFF;
    }

    .bento-box-dark {
      border: 1px solid #E70000;
      border-radius: 1.5rem;
      overflow: hidden;
      background-color: #000000;
      color: #F4F4F0;
    }

    .border-hairline {
      border: 1px solid #E70000;
    }
  </style>
